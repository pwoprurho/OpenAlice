name: Release

on:
  push:
    # Releases are cut only from the stable user-facing lane. Routine work
    # lands on dev first and reaches release eligibility through promotion.
    branches: [master]
  workflow_dispatch:
    inputs:
      mirror_tag:
        description: Existing release tag to mirror to the download CDN without cutting a new release.
        required: false
        type: string

jobs:
  release:
    name: Plan release candidate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      # Whether this push introduces a version that does not have a tag yet.
      # The tag and GitHub Release are deliberately created only after every
      # platform builds and passes Workspace acceptance.
      created: ${{ !github.event.inputs.mirror_tag && steps.check.outputs.exists == 'false' }}
      tag: ${{ github.event.inputs.mirror_tag || steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git-cliff

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

          # Determine if pre-release (contains - like beta.1, rc.1)
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install git-cliff
        if: steps.check.outputs.exists == 'false' && !github.event.inputs.mirror_tag
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        if: steps.check.outputs.exists == 'false' && !github.event.inputs.mirror_tag
        id: notes
        run: |
          # Generate notes for this version only (since last tag).
          # --tag labels the about-to-be-created version: git-cliff runs
          # BEFORE the tag exists (it's created only after candidate acceptance), so without
          # this the section header falls back to "[Unreleased]" instead of
          # the version. See cliff.toml's `{% if version %}` template.
          TAG="${{ steps.version.outputs.tag }}"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            git-cliff --tag "$TAG" --output notes.md
          else
            git-cliff "$LAST_TAG"..HEAD --tag "$TAG" --output notes.md
          fi

      - name: Preserve release notes for gated publication
        if: steps.check.outputs.exists == 'false' && !github.event.inputs.mirror_tag
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: notes.md
          if-no-files-found: error

  # Per-platform desktop installers are built and acceptance-tested before any
  # tag or GitHub Release exists. Each runner builds only its own platform/arch.
  # Optional broker SDKs are emitted as separate version/platform-specific
  # Broker Packs and are rejected if they leak back into the desktop app. macOS
  # builds are signed and notarized through Developer ID secrets; Windows remains
  # unsigned until a Windows code-signing certificate exists.
  build-desktop:
    needs: release
    if: needs.release.outputs.created == 'true' && !github.event.inputs.mirror_tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15-intel
            arch: x64
          - os: windows-latest
            arch: x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build optional Broker Packs
        run: pnpm broker-packs:build

      # Fail loud if dugite's postinstall was skipped (e.g. dropped from
      # pnpm.onlyBuiltDependencies) — otherwise node_modules/dugite/git/ is
      # silently empty and workspace creation breaks at runtime, not build.
      - name: Verify bundled git (dugite) was fetched
        run: |
          node -e "const{existsSync}=require('fs');const{dirname,join}=require('path');const g=join(dirname(require.resolve('dugite/package.json')),'git');if(!existsSync(g)){console.error('dugite embedded git MISSING at '+g);process.exit(1)}console.log('dugite embedded git OK '+g)"

      - name: Build Alice + UTA + desktop shell
        run: pnpm electron:build

      - name: Vendor managed workspace runtime
        run: pnpm vendor:runtime

      - name: Write Apple notarization API key
        if: runner.os == 'macOS'
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - name: Package macOS installer
        if: runner.os == 'macOS'
        # Build on the matching native host so pnpm and electron-builder both
        # select the correct native dependencies for arm64 or Intel.
        run: |
          ulimit -n 65536 || ulimit -n 32768 || ulimit -n 16384 || ulimit -n 10240
          echo "open files limit: $(ulimit -n)"
          pnpm -F @traderalice/desktop exec electron-builder --projectDir ../.. --publish never --${{ matrix.arch }}
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Package Windows installer
        if: runner.os == 'Windows'
        # Windows remains unsigned until a Windows code-signing certificate is
        # available.
        run: pnpm -F @traderalice/desktop exec electron-builder --projectDir ../.. --publish never --${{ matrix.arch }}

      - name: Prove release candidate Workspace CLI acceptance
        run: pnpm electron:smoke:workspace --skip-build --skip-pack
        timeout-minutes: 5
        env:
          OPENALICE_SMOKE_RECEIPT_PATH: ${{ runner.temp }}/openalice-workspace-acceptance.json

      - name: Preserve release acceptance receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-acceptance-${{ runner.os }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/openalice-workspace-acceptance.json
          if-no-files-found: warn
          retention-days: 7

      - name: Prepare update channel aliases
        shell: bash
        env:
          RELEASE_PLATFORM: ${{ runner.os }}
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node scripts/prepare-desktop-release-assets.mjs build \
            --out-dir dist/electron-app \
            --platform "$RELEASE_PLATFORM" \
            --arch "$RELEASE_ARCH" \
            --version "$VERSION"
          rm -f dist/electron-app/builder-debug.yml

      - name: Preserve accepted release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch }}
          path: |
            dist/electron-app/*.dmg
            dist/electron-app/*.zip
            dist/electron-app/*.yml
            dist/electron-app/*.blockmap
            dist/electron-app/*.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

      - name: Preserve optional Broker Packs
        uses: actions/upload-artifact@v4
        with:
          name: broker-packs-${{ runner.os }}-${{ matrix.arch }}
          path: |
            dist/broker-packs/*.json
            dist/broker-packs/*.tgz
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  cli-installer-acceptance:
    name: Accept CLI installer candidate
    needs: release
    if: needs.release.outputs.created == 'true' && !github.event.inputs.mirror_tag
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - name: Exercise candidate installer in a clean HTTP fixture
        run: node scripts/install-docker-smoke.mjs

      - name: Exercise candidate installer through managed SSH remote
        run: node scripts/remote-ssh-smoke.mjs

  build-linux-broker-packs:
    name: Build Linux Broker Packs
    needs: release
    if: needs.release.outputs.created == 'true' && !github.event.inputs.mirror_tag
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build optional Broker Packs
        run: pnpm broker-packs:build

      - name: Preserve Linux Broker Packs
        uses: actions/upload-artifact@v4
        with:
          name: broker-packs-Linux-x64
          path: |
            dist/broker-packs/*.json
            dist/broker-packs/*.tgz
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  publish-release:
    name: Publish accepted release
    needs: [release, build-desktop, build-linux-broker-packs, cli-installer-acceptance]
    if: needs.release.outputs.created == 'true' && needs.build-desktop.result == 'success' && needs.build-linux-broker-packs.result == 'success' && needs.cli-installer-acceptance.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: dist/release-notes

      - uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: dist/release-assets
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: broker-packs-*
          path: dist/release-broker-packs
          merge-multiple: true

      - name: Create tag and GitHub Release from accepted candidates
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          name: ${{ needs.release.outputs.tag }}
          body_path: dist/release-notes/notes.md
          prerelease: ${{ needs.release.outputs.prerelease == 'true' }}
          generate_release_notes: false
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          files: |
            dist/release-assets/*.dmg
            dist/release-assets/*.zip
            dist/release-assets/*.yml
            dist/release-assets/*.blockmap
            dist/release-assets/*.exe
            dist/release-broker-packs/*.json
            dist/release-broker-packs/*.tgz

  mirror-release-assets:
    needs: [release, publish-release]
    if: always() && ((needs.release.outputs.created == 'true' && needs.publish-release.result == 'success') || github.event.inputs.mirror_tag)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # A manual mirror is an idempotent repair of an existing release.
          # Always derive the installer from that tag, never from whichever
          # commit happens to be at master when the workflow is dispatched.
          ref: ${{ github.event.inputs.mirror_tag || needs.release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.mirror_tag || needs.release.outputs.tag }}
        run: |
          mkdir -p dist/r2-upload
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir dist/r2-upload --clobber

      - name: Prepare release-owned CLI installer
        env:
          TAG: ${{ github.event.inputs.mirror_tag || needs.release.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          test "$PACKAGE_VERSION" = "$VERSION"
          bash -n install
          cp install "dist/r2-upload/OpenAlice-${VERSION}-install"

      - name: Prepare CDN download aliases
        env:
          TAG: ${{ github.event.inputs.mirror_tag || needs.release.outputs.tag }}
          DOWNLOAD_BASE_URL: ${{ secrets.DOWNLOAD_BASE_URL }}
        run: |
          node scripts/prepare-desktop-release-assets.mjs mirror \
            --out-dir dist/r2-upload \
            --tag "$TAG" \
            --base-url "${DOWNLOAD_BASE_URL:-https://download.openalice.ai}" \
            --repository "$GITHUB_REPOSITORY"

      - name: Publish generated release metadata and installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.mirror_tag || needs.release.outputs.tag }}
        run: |
          shopt -s nullglob
          files=(dist/r2-upload/*-mac-intel.yml dist/r2-upload/*-intel-mac.yml dist/r2-upload/latest-mac-arm64.yml)
          installer="dist/r2-upload/OpenAlice-${TAG#v}-install"
          if [ -f "$installer" ]; then
            files+=("$installer")
          fi
          if ((${#files[@]})); then
            gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          fi

      - name: Install AWS CLI
        run: |
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Mirror release assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: true
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          aws s3 cp dist/r2-upload "s3://${R2_BUCKET}/" \
            --recursive \
            --exclude "*.yml" \
            --exclude "manifest.json" \
            --exclude "mac-arm64.dmg" \
            --exclude "mac-arm64.zip" \
            --exclude "mac-x64.dmg" \
            --exclude "mac-x64.zip" \
            --exclude "windows-x64.exe" \
            --exclude "install" \
            --exclude "OpenAlice-*-install" \
            --cache-control "public, max-age=31536000, immutable" \
            --endpoint-url "$ENDPOINT"

          aws s3 cp dist/r2-upload "s3://${R2_BUCKET}/" \
            --recursive \
            --exclude "*" \
            --include "*.yml" \
            --cache-control "no-cache" \
            --content-type "text/yaml" \
            --endpoint-url "$ENDPOINT"

          aws s3 cp dist/r2-upload/manifest.json "s3://${R2_BUCKET}/manifest.json" \
            --cache-control "no-cache" \
            --content-type "application/json" \
            --endpoint-url "$ENDPOINT"

          for installer in dist/r2-upload/OpenAlice-*-install; do
            aws s3 cp "$installer" "s3://${R2_BUCKET}/$(basename "$installer")" \
              --cache-control "public, max-age=31536000, immutable" \
              --content-type "text/plain" \
              --endpoint-url "$ENDPOINT"
          done

          aws s3 cp dist/r2-upload/install "s3://${R2_BUCKET}/install" \
            --cache-control "no-cache" \
            --content-type "text/plain" \
            --endpoint-url "$ENDPOINT"

          if [ -f dist/r2-upload/mac-arm64.dmg ]; then
            aws s3 cp dist/r2-upload/mac-arm64.dmg "s3://${R2_BUCKET}/mac-arm64.dmg" \
              --cache-control "no-cache" \
              --content-type "application/x-apple-diskimage" \
              --endpoint-url "$ENDPOINT"
          fi

          if [ -f dist/r2-upload/mac-arm64.zip ]; then
            aws s3 cp dist/r2-upload/mac-arm64.zip "s3://${R2_BUCKET}/mac-arm64.zip" \
              --cache-control "no-cache" \
              --content-type "application/zip" \
              --endpoint-url "$ENDPOINT"
          fi

          if [ -f dist/r2-upload/mac-x64.dmg ]; then
            aws s3 cp dist/r2-upload/mac-x64.dmg "s3://${R2_BUCKET}/mac-x64.dmg" \
              --cache-control "no-cache" \
              --content-type "application/x-apple-diskimage" \
              --endpoint-url "$ENDPOINT"
          fi

          if [ -f dist/r2-upload/mac-x64.zip ]; then
            aws s3 cp dist/r2-upload/mac-x64.zip "s3://${R2_BUCKET}/mac-x64.zip" \
              --cache-control "no-cache" \
              --content-type "application/zip" \
              --endpoint-url "$ENDPOINT"
          fi

          if [ -f dist/r2-upload/windows-x64.exe ]; then
            aws s3 cp dist/r2-upload/windows-x64.exe "s3://${R2_BUCKET}/windows-x64.exe" \
              --cache-control "no-cache" \
              --content-type "application/vnd.microsoft.portable-executable" \
              --endpoint-url "$ENDPOINT"
          fi

      - name: Verify CDN metadata
        env:
          DOWNLOAD_BASE_URL: ${{ secrets.DOWNLOAD_BASE_URL }}
          PUBLIC_INSTALL_URL: https://openalice.ai/install
          TAG: ${{ github.event.inputs.mirror_tag || needs.release.outputs.tag }}
        run: |
          BASE_URL="${DOWNLOAD_BASE_URL%/}"
          VERSION="${TAG#v}"
          CHANNEL="latest"
          shopt -s nullglob

          if [[ "$VERSION" == *-* ]]; then
            CHANNEL="${VERSION#*-}"
            CHANNEL="${CHANNEL%%.*}"
          fi

          if [ "$CHANNEL" = "latest" ]; then
            MAC_METADATA="latest-mac.yml"
            WINDOWS_METADATA="latest.yml"
          else
            MAC_METADATA="${CHANNEL}-mac.yml"
            WINDOWS_METADATA="${CHANNEL}.yml"
          fi

          curl -fsSI "${BASE_URL}/${MAC_METADATA}"
          curl -fsSI "${BASE_URL}/${WINDOWS_METADATA}"
          curl -fsSI "${BASE_URL}/OpenAlice-${VERSION}-arm64.dmg"
          curl -fsSI "${BASE_URL}/mac-arm64.dmg"
          if [ -f dist/r2-upload/mac-x64.dmg ]; then
            curl -fsSI "${BASE_URL}/mac-x64.dmg"
          fi
          if [ -f dist/r2-upload/mac-x64.zip ]; then
            curl -fsSI "${BASE_URL}/mac-x64.zip"
          fi
          if [ -f "dist/r2-upload/${CHANNEL}-mac-intel.yml" ]; then
            curl -fsSI "${BASE_URL}/${CHANNEL}-mac-intel.yml"
          fi
          curl -fsSI "${BASE_URL}/windows-x64.exe"
          curl -fsSI "${BASE_URL}/manifest.json"
          curl -fsSI "${BASE_URL}/OpenAlice-${VERSION}-install"
          curl -fsSI "${BASE_URL}/install"
          curl -fsSL "${BASE_URL}/OpenAlice-${VERSION}-install" -o /tmp/openalice-versioned-install
          curl -fsSL "${BASE_URL}/install" -o /tmp/openalice-install
          curl -fsSL "$PUBLIC_INSTALL_URL" -o /tmp/openalice-site-install
          cmp /tmp/openalice-versioned-install "dist/r2-upload/OpenAlice-${VERSION}-install"
          cmp /tmp/openalice-install dist/r2-upload/install
          cmp /tmp/openalice-versioned-install /tmp/openalice-install
          cmp /tmp/openalice-install /tmp/openalice-site-install
          bash -n /tmp/openalice-install
          bash /tmp/openalice-install --plan | tee /tmp/openalice-install-plan
          grep -Eq '^  Branch[[:space:]]+master$' /tmp/openalice-install-plan
          INSTALLER_PATH=/tmp/openalice-install MANIFEST_URL="${BASE_URL}/manifest.json" node -e '
            const { createHash } = require("node:crypto");
            const { readFileSync } = require("node:fs");
            const manifest = JSON.parse(require("node:child_process").execFileSync("curl", ["-fsSL", process.env.MANIFEST_URL], { encoding: "utf8" }));
            const digest = createHash("sha256").update(readFileSync(process.env.INSTALLER_PATH)).digest("hex");
            if (manifest.installer?.url !== process.env.MANIFEST_URL.replace(/manifest\.json$/, "install")) process.exit(1);
            if (manifest.installer?.sha256 !== digest) process.exit(1);
          '

          for catalog in dist/r2-upload/OpenAlice-Broker-Packs-${VERSION}-*.json; do
            curl -fsSI "${BASE_URL}/$(basename "$catalog")"
            CATALOG="$catalog" node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync(process.env.CATALOG,'utf8'));for(const p of c.packs)console.log(p.file)" |
              while IFS= read -r pack; do curl -fsSI "${BASE_URL}/${pack}"; done
          done

          WINDOWS_FEED_EXE=$(
            WINDOWS_METADATA="$WINDOWS_METADATA" node -e "const fs=require('fs');const content=fs.readFileSync('dist/r2-upload/'+process.env.WINDOWS_METADATA,'utf8');const match=content.match(/(?:^|\\n)path:\\s*['\"]?([^'\"\\n]+)['\"]?/);process.stdout.write(match?.[1]?.trim()||'')"
          )

          if [ -n "$WINDOWS_FEED_EXE" ]; then
            WINDOWS_FEED_URL=$(
              WINDOWS_FEED_EXE="$WINDOWS_FEED_EXE" node -e "process.stdout.write(encodeURI(process.env.WINDOWS_FEED_EXE))"
            )
            curl -fsSI "${BASE_URL}/${WINDOWS_FEED_URL}"
            curl -fsSI "${BASE_URL}/${WINDOWS_FEED_URL}.blockmap"
          fi
